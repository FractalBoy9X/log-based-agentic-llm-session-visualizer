<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agentic Thinking Visualization{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2933;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1.75rem;
            background: #0f172a;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .brand {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.04em;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a {
            padding: 0.55rem 1rem;
            font-size: 0.9rem;
            border-radius: 6px;
            transition: background 0.2s ease;
        }
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .page-shell {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.75rem clamp(1.5rem, 4vw, 3rem) 2.5rem;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 45px rgba(15, 23, 42, 0.12);
            padding: 1.6rem;
        }
        .btn {
            border: none;
            border-radius: 999px;
            padding: 0.65rem 1.25rem;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(37, 99, 235, 0.32);
        }
        .badge {
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.35rem 0.75rem;
            display: inline-block;
        }
        @media (max-width: 720px) {
            .top-nav {
                flex-direction: column;
                gap: 0.75rem;
            }
            .page-shell {
                padding: 1.25rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="top-nav">
    <div class="brand">
        <a href="{% url 'home' %}">Agentic Thinking Visualization</a>
    </div>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'agentic_thinking_visualization' %}">Visualization</a>
        <a href="{% url 'log_manager' %}">Log Manager</a>
        <a href="{% url 'instructions' %}">Instructions</a>
    </div>
</nav>
<main class="page-shell">
    {% block content %}{% endblock %}
</main>
</body>
</html>
